# WP Private AI — nginx Gateway (Deployment Model 1)
# Per-site Bearer token auth + rate limiting + Ollama proxy.
# nginx 1.24+
#
# Setup:
#   1. Replace 'ollama.yourdomain.com' with your domain
#   2. Generate one token per site: openssl rand -hex 32
#   3. Add tokens to the map block below
#   4. certbot --nginx -d ollama.yourdomain.com
#   5. ln -s /etc/nginx/sites-available/ollama-gateway /etc/nginx/sites-enabled/
#   6. nginx -t && systemctl reload nginx

map $http_authorization $api_key_valid {
    default                          "0";
    # Add one entry per WordPress site:
    # "Bearer <token-from-openssl>"   "1";
    "Bearer REPLACE_SITE_1_TOKEN"    "1";
    "Bearer REPLACE_SITE_2_TOKEN"    "1";
}

limit_req_zone $http_authorization zone=per_site:10m rate=10r/m;

server {
    listen 443 ssl http2;
    server_name ollama.yourdomain.com;
    # ssl_certificate and ssl_certificate_key set by Certbot

    location /api/chat {
        if ($http_authorization = "") {
            return 401 '{"error":"Authorization header required"}';
        }
        if ($api_key_valid = "0") {
            return 403 '{"error":"Invalid or unknown API key"}';
        }

        limit_req zone=per_site burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:11434;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host localhost;
        proxy_read_timeout 120s;

        # Required for Ollama NDJSON — disable buffering
        proxy_buffering    off;
        proxy_cache        off;

        proxy_set_header   X-Site-Id $http_x_site_id;
    }

    location / {
        return 404 '{"error":"Not found"}';
    }
}

server {
    listen 80;
    server_name ollama.yourdomain.com;
    return 301 https://$host$request_uri;
}
