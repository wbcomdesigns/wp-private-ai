services:
  ollama:
    image: ollama/ollama:latest
    container_name: wp-private-ai
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"   # localhost only — never expose directly
    volumes:
      - ollama_models:/root/.ollama
    environment:
      OLLAMA_NUM_PARALLEL: "1"    # queue requests, prevents OOM on small VPS
      OLLAMA_KEEP_ALIVE: "5m"     # unload model after idle to free RAM
    deploy:
      resources:
        limits:
          memory: 12G

volumes:
  ollama_models:
